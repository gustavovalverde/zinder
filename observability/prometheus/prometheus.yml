global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: "zinder-ingest"
    scrape_interval: 5s
    scrape_timeout: 3s
    metrics_path: "/metrics"
    static_configs:
      - targets: ["host.docker.internal:9190"]
        labels:
          stack: "zinder-local"
          service: "zinder-ingest"

  - job_name: "zinder-query"
    scrape_interval: 5s
    scrape_timeout: 3s
    metrics_path: "/metrics"
    static_configs:
      - targets: ["host.docker.internal:9191"]
        labels:
          stack: "zinder-local"
          service: "zinder-query"

  - job_name: "zinder-compat-lightwalletd"
    scrape_interval: 5s
    scrape_timeout: 3s
    metrics_path: "/metrics"
    static_configs:
      - targets: ["host.docker.internal:9192"]
        labels:
          stack: "zinder-local"
          service: "zinder-compat-lightwalletd"
