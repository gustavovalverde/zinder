x-common: &common
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "5"
  cap_drop: [ALL]
  security_opt: [no-new-privileges:true]

services:
  prometheus:
    image: prom/prometheus:v3.2.0
    container_name: zinder_prometheus
    restart: unless-stopped
    <<: *common
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - zinder_prometheus_data:/prometheus
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/rules:/etc/prometheus/rules:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    ports:
      - "${ZINDER_PROMETHEUS_PORT:-9095}:9090"
    networks:
      - zinder_observability
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6

  grafana:
    image: grafana/grafana:11.5.1
    container_name: zinder_grafana
    restart: unless-stopped
    <<: *common
    volumes:
      - zinder_grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/zinder-overview.json
      GF_SECURITY_ADMIN_PASSWORD: ${ZINDER_GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_DEFAULT_THEME: light
    ports:
      - "${ZINDER_GRAFANA_PORT:-3002}:3000"
    networks:
      - zinder_observability
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

volumes:
  zinder_prometheus_data:
  zinder_grafana_data:

networks:
  zinder_observability:
    driver: bridge
