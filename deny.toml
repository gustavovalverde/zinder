# Dependency policy for the Zinder workspace.
#
# Keep this file small. Exceptions should explain the crate and the reason.

[graph]
all-features = true

[advisories]
ignore = []

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.8
exceptions = [
    # Zcash parser stack transitively uses `arrayref` through BLAKE2b/Equihash.
    { allow = ["BSD-2-Clause"], name = "arrayref" },
    # Zcash script parser transitively uses `bounded-vec`.
    { allow = ["CC0-1.0"], name = "bounded-vec" },
    # Zcash transparent parsing transitively uses RustCrypto secp256k1 crates.
    { allow = ["CC0-1.0"], name = "secp256k1" },
    { allow = ["CC0-1.0"], name = "secp256k1-sys" },
    # Zebra pulls `option-ext` through `dirs` for filesystem path handling.
    { allow = ["MPL-2.0"], name = "option-ext" },
    # jsonrpsee's HTTP client uses `rustls-platform-verifier` which bundles
    # Mozilla CA root certificates published under CDLA-Permissive-2.0.
    { allow = ["CDLA-Permissive-2.0"], name = "webpki-root-certs" },
]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
    # Temporary core2 source pin required by zebra-chain 6.0.2 through equihash 0.2.2.
    "https://github.com/bbqsrc/core2",
]
